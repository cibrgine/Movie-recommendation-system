<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch AI - Premium Movie Recommendation Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Background Blurry Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <span class="gradient-text">CineMatch AI</span>
            </div>
            <p class="subtitle">Next-generation recommendation system powered by LLM semantic embeddings & collaborative user matching.</p>
        </header>

        <!-- Main Dashboard Control Panel -->
        <main class="dashboard-panel">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" id="movie-tab-btn" data-tab="movie-tab">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M17 3v18"/><path d="M3 7h4"/><path d="M3 17h4"/><path d="M17 17h4"/><path d="M17 7h4"/><path d="M7 12h10"/></svg>
                    Similar Movies & Shows
                </button>
                <button class="tab-btn" id="user-tab-btn" data-tab="user-tab">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Client Personalized
                </button>
            </div>

            <!-- Tab Contents -->
            <div class="tab-content active" id="movie-tab">
                <div class="search-container">
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <input type="text" id="movie-search-input" placeholder="Type a movie or TV show you liked (e.g. Interstellar, Breaking Bad, Toy Story)..." autocomplete="off">
                        <button class="clear-btn" id="clear-search-btn" style="display: none;">&times;</button>
                    </div>
                    <div class="autocomplete-list" id="autocomplete-results"></div>
                </div>
            </div>

            <div class="tab-content" id="user-tab">
                <div class="user-search-container">
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
                        <input type="number" id="user-id-input" placeholder="Enter a MovieLens Client ID (1 - 610)..." min="1" max="610">
                        <button class="action-btn" id="get-user-rec-btn">Get Recommendations</button>
                    </div>
                    <div class="user-suggestions">
                        <span class="label">Quick Tests:</span>
                        <button class="suggest-btn" data-uid="45" id="suggest-btn-45">Client 45</button>
                        <button class="suggest-btn" data-uid="102" id="suggest-btn-102">Client 102</button>
                        <button class="suggest-btn" data-uid="300" id="suggest-btn-300">Client 300</button>
                        <button class="suggest-btn" data-uid="580" id="suggest-btn-580">Client 580</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Loader -->
        <div class="loader-container" id="loader" style="display: none;">
            <div class="spinner"></div>
            <p id="loader-text">Scanning similarity vectors...</p>
        </div>

        <!-- Selection Context Panel (Shows details about selected movie or selected user's preferences) -->
        <div class="context-panel" id="context-panel" style="display: none;">
            <h2 id="context-title">Selected Target</h2>
            <div class="context-history" id="context-history"></div>
        </div>

        <!-- Recommendations Grid -->
        <section class="results-section">
            <div class="results-grid" id="results-grid">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="sparkles-icon"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                    <h3>Ready to Recommend</h3>
                    <p>Search for a title you love or select a Client ID to see AI-driven recommendations instantly.</p>
                </div>
            </div>
        </section>
    </div>

    <!-- Script -->
    <script src="/static/script.js"></script>
</body>
</html>
